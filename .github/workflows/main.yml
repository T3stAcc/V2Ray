name: Update Configs

on:
  push:
    branches: [main]
  schedule:
    - cron: "*/30 * * * *"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - run: pip install -r Files/requirements.txt
      - run: python Files/app.py && python Files/sort.py
      - uses: EndBug/add-and-commit@v10
        with:
          author_name: T3stAcc
          message: Updated!
